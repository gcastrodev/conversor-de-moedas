<!doctype html>
<html>
    <head lang="pt-br">
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <title>Conversor de moedas</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
        <script src="main.js" defer></script>
    </head>
    <body>
        <img 
        class="logo"
        src="assets/tio-patinhas.gif"
        alt="Tio Patinhas"
        class="tio-patinhas"
        />

        <main>
            <label for="">
                Converter <b>de</b>
                <select name="" id="">
                <option value="">R$ Real Brasileiro</option>
                </select>
            </label>

            <label for="">
                Converter <b>para</b>
                <select name="" id="">
                <option value="">US $ Dólar Americano</option>
                <option value="">€ Euro</option>
                </select>
            </label>

            <label for="">
                Valor
                <input type="number" placeholder="R$ 10.000,00" />
            </label>

            <button>Converter</button>

            <section>
                <div class="currency-box">
                <img class="flag" src="assets/brazil-flag.png" alt="logo moeda à converter" />
                <p class="currency">Real Brasileiro</p>
                <p class="currency-value">R$ 0,00</p>
                </div>

                <img class="arrow" src="assets/arrow.jpg" alt="seta indicando a conversão" />

                <div class="currency-box">
                <img class="flag" src="assets/usa-flag.svg" alt="logo moeda à converter" />
                <p class="currency">Dólar Americano</p>
                <p class="currency-value">US$ 0,00</p>
                </div>
            </section>
        </main>
    </body>
</html>
